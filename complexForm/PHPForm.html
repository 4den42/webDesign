<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch Form</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            width: 70%;
            margin: 20px auto;
            background-color: gainsboro;
        }
        #fv {
            width: 100%;
            margin: 20px auto;
        }
        form {
            background-color: white;
            padding: 2em;
        }
        fieldset {
            padding: 20px;
            margin: 20px;
        }
        input[type=submit] {
            font-size: 1.2em;
            padding: 1em;
            margin: 20px;
        }
        select {
            width:10em
        }
    </style>
</head>

<body>
    <h1>Lunch Form</h1>
    <label for="fv">Form viewer:</label><br>
    <ul>
        <li>https://wp.zybooks.com/form-viewer.php</li>
        <li>formexample.php</li>
        <li>formexample.txt</li>
    </ul>
    <input id="fv" type="text" value="" placeholder="https://csci331.cs.montana.edu/~h48c334/formviewer/form-viewer.php">
    <br>

        <!-- <form action="https://csci331.cs.montana.edu/~h48c334/formviewer/form-viewer.php> -->
        <!-- <form action="https://wp.zybooks.com/form-viewer.php" method="POST"> -->
        <form action="https://csci331.cs.montana.edu/~h48c334/formviewer/form-viewer.php" method="GET">

        <fieldset><legend>Radio vs Checkbox</legend>
            
            <input type="radio" name="protien" id="rb1" value="beef">
            <label for="rb1">Beef</label><br>
            
            <input type="radio" name="protien" id="rb2" value="chicken">
            <label for="rb2">Chicken</label><br>

            <input type="radio" name="protien" id="rb3" value="pork">
            <label for="rb3">Pork</label><br>
            <br>
            
            <input type="checkbox" name="lettuce" id="cb1">
            <label for="cb1">Lettuce</label><br>
            
            <input type="checkbox" name="onion" id="cb2">
            <label for="cb2">Onion</label><br>
            
            <input type="checkbox" name="tomato" id="cb3">
            <label for="cb3">Tomato</label><br>
        </fieldset>
        <br>
        <fieldset><legend>Select vs Multiselect</legend>
            <label for="drink">Drink:</label>
            <select name="drink" id="drink">
                <optgroup label="Shake">
                    <option value="vanilla shake">Vanilla</option>
                    <option value="choco shake">Chocolate</option>
                </optgroup>
                <optgroup label="Soda">
                    <option value="coke" selected="">Coke</option>
                    <option value="7up">7up</option>
                </optgroup>
            </select><br><br>

            <label for="extras">Extra:</label>
            <select name="extras[]" id="extras" size="2" multiple="">
                <option value="soup">Soup</option>
                <option value="salad">Salad</option>
                <option value="chips">Chips</option>
                <option value="pickle">Pickle</option>
            </select><br>
        </fieldset>
        <br>
        <input type="submit" value="Order Lunch">        
        </form>

    

    <script>
        // get the input box element
        const fvbox = document.getElementById("fv");
        // on input, evaluate task...
        fvbox.addEventListener("input", handleInput);

        // get the first (and only) form element; get it's value
        form = document.querySelector("form");

        function handleInput() {
            // if it's there, change form action to input box string
            if(fvbox.value != ""){
                form.setAttribute("action", fvbox.value)
            }
            else {
                fvdefault = "./form-viewer.php";
                form.setAttribute("action", fvdefault);
            }
        }

    </script>



</body></html>
